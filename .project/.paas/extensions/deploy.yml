id: deploy
name: Build on Server and Deploy
description: Upload source via SSH, build image on server, push to registry, deploy via dashboard API

inputs:
  - name: app_name
    label: Application name
    type: text
    default: starter
  - name: app_id
    label: Application ID
    type: text
    required: true
  - name: registry_host
    label: Registry host
    type: text
    required: true
  - name: image_repository
    label: Image repository (org/name)
    type: text
    required: true
  - name: registry_username
    label: Registry username
    type: text
    required: true
  - name: registry_password
    label: Registry password
    type: password
    required: true
  - name: dashboard_url
    label: Dashboard URL
    type: text
    required: true
  - name: dashboard_user
    label: Dashboard user
    type: text
    required: true
  - name: dashboard_pass
    label: Dashboard password
    type: password
    required: true
  - name: tag
    label: Override image tag (leave empty for git SHA)
    type: text
    default: ""
  - name: healthcheck_url
    label: Healthcheck URL (leave empty to skip)
    type: text
    default: ""

steps:
  - id: prepare_git_sha
    run: |
      set -eu
      git rev-parse --short=12 HEAD
    capture: git_sha
    description: "Get git SHA"
    local: true

  - id: prepare_image_tag
    run: |
      set -eu
      if [ -n "${INPUT_TAG}" ]; then
        echo "${INPUT_TAG}"
      else
        echo "sha-${STEP_GIT_SHA}"
      fi
    capture: image_tag
    description: "Choose image tag"
    local: true

  - id: prepare_image_ref
    run: |
      set -eu
      echo "${INPUT_REGISTRY_HOST}/${INPUT_IMAGE_REPOSITORY}"
    capture: image_ref
    description: "Build image reference"
    local: true

  - id: upload_source
    run: |
      set -eu
      git archive --format=tar HEAD | ssh ${SERVER_USER}@${SERVER_HOST} "mkdir -p /tmp/build-${INPUT_APP_NAME} && tar -xf - -C /tmp/build-${INPUT_APP_NAME}"
    description: "Upload source to server"
    local: true

  - id: registry_login
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    run: |
      set -eu
      printf '%s\n' "${INPUT_REGISTRY_PASSWORD}" | docker login "${INPUT_REGISTRY_HOST}" --username "${INPUT_REGISTRY_USERNAME}" --password-stdin
    description: "Log in to registry"

  - id: build_image
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    run: |
      set -eu
      cd /tmp/build-${INPUT_APP_NAME}
      docker build \
        -t "${STEP_IMAGE_REF}:${STEP_IMAGE_TAG}" \
        -t "${STEP_IMAGE_REF}:main" \
        .
    description: "Build Docker image on server"

  - id: push_sha_image
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    run: |
      set -eu
      docker push "${STEP_IMAGE_REF}:${STEP_IMAGE_TAG}"
    description: "Push SHA-tagged image"

  - id: push_main_image
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    run: |
      set -eu
      docker push "${STEP_IMAGE_REF}:main"
    description: "Push main tag"

  - id: render_compose
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    run: |
      set -eu
      cd /tmp/build-${INPUT_APP_NAME}
      APP_IMAGE="${STEP_IMAGE_REF}:${STEP_IMAGE_TAG}" docker compose -f docker-compose.yml config > /tmp/rendered-compose.yml
      echo "Rendered compose:"
      head -20 /tmp/rendered-compose.yml
    description: "Render compose YAML"

  - id: build_payload
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    run: |
      set -eu
      jq -n \
        --arg name "${INPUT_APP_NAME}" \
        --rawfile compose_yaml /tmp/rendered-compose.yml \
        '{name: $name, compose_yaml: $compose_yaml}' > /tmp/dashboard-update.json
    description: "Build dashboard payload"

  - id: update_dashboard
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    run: |
      set -eu
      if ! curl --fail --show-error --silent \
        -u "${INPUT_DASHBOARD_USER}:${INPUT_DASHBOARD_PASS}" \
        -X PUT "${INPUT_DASHBOARD_URL}/api/apps/${INPUT_APP_ID}" \
        -H 'Content-Type: application/json' \
        --data @/tmp/dashboard-update.json; then
        echo "--- Dashboard logs ---"
        curl --show-error --silent \
          -u "${INPUT_DASHBOARD_USER}:${INPUT_DASHBOARD_PASS}" \
          "${INPUT_DASHBOARD_URL}/api/apps/${INPUT_APP_ID}/logs?lines=60" || true
        exit 1
      fi
    description: "Update dashboard compose"

  - id: trigger_deploy
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    run: |
      set -eu
      if ! curl --fail --show-error --silent \
        -u "${INPUT_DASHBOARD_USER}:${INPUT_DASHBOARD_PASS}" \
        -X POST "${INPUT_DASHBOARD_URL}/api/apps/${INPUT_APP_ID}/deploy"; then
        echo "--- Dashboard logs ---"
        curl --show-error --silent \
          -u "${INPUT_DASHBOARD_USER}:${INPUT_DASHBOARD_PASS}" \
          "${INPUT_DASHBOARD_URL}/api/apps/${INPUT_APP_ID}/logs?lines=60" || true
        exit 1
      fi
    description: "Trigger deploy"

  - id: cleanup
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    run: |
      rm -rf /tmp/build-${INPUT_APP_NAME} /tmp/rendered-compose.yml /tmp/dashboard-update.json
    description: "Clean up build directory"
    ignore_error: true

  - id: smoke_test
    env:
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    run: |
      set -eu
      for attempt in 1 2 3 4 5 6; do
        if curl --fail --show-error --silent "${INPUT_HEALTHCHECK_URL}"; then
          echo ""
          echo "Health check passed"
          exit 0
        fi
        sleep 5
      done
      echo "Health check failed after 30s"
      exit 1
    description: "Smoke test"
    local: true
    when: INPUT_HEALTHCHECK_URL != ""
