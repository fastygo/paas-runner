id: deploy
name: Build and Deploy
description: Build locally, push to the registry, and deploy through the dashboard API
inputs:
  - name: app_name
    label: Application name
    type: text
    default: starter
  - name: app_id
    label: Application id
    type: text
    required: true
  - name: registry_host
    label: Registry host
    type: text
    required: true
  - name: image_repository
    label: Image repository
    type: text
    required: true
  - name: registry_username
    label: Registry username
    type: text
    required: true
  - name: registry_password
    label: Registry password
    type: password
    required: true
  - name: dashboard_url
    label: Dashboard URL
    type: text
    required: true
  - name: dashboard_user
    label: Dashboard user
    type: text
    required: true
  - name: dashboard_pass
    label: Dashboard password
    type: password
    required: true
  - name: tag
    label: Override image tag
    type: text
    default: ""
  - name: healthcheck_url
    label: Healthcheck URL
    type: text
    default: ""
steps:
  - id: validate_config
    run: |
      set -eu
      test -n "${INPUT_REGISTRY_HOST}"
      test -n "${INPUT_IMAGE_REPOSITORY}"
      test -n "${INPUT_REGISTRY_USERNAME}"
      test -n "${INPUT_REGISTRY_PASSWORD}"
      test -n "${INPUT_APP_NAME}"
      test -n "${INPUT_DASHBOARD_URL}"
      test -n "${INPUT_DASHBOARD_USER}"
      test -n "${INPUT_DASHBOARD_PASS}"
      test -n "${INPUT_APP_ID}"
    description: "Check required configuration"
    local: true
  - id: prepare_git_sha
    run: |
      set -eu
      git rev-parse --short=12 HEAD
    capture: git_sha
    description: "Prepare git short SHA"
    local: true
  - id: prepare_image_ref
    run: |
      set -eu
      echo "${INPUT_REGISTRY_HOST}/${INPUT_IMAGE_REPOSITORY}"
    capture: image_ref
    description: "Build image reference"
    local: true
  - id: prepare_image_tag
    run: |
      set -eu
      if [ -n "${INPUT_TAG}" ]; then
        echo "${INPUT_TAG}"
      else
        echo "sha-${STEP_GIT_SHA}"
      fi
    capture: image_tag
    description: "Choose image tag"
    local: true
  - id: registry_login
    run: |
      set -eu
      printf '%s\n' "${INPUT_REGISTRY_PASSWORD}" | docker login "${INPUT_REGISTRY_HOST}" --username "${INPUT_REGISTRY_USERNAME}" --password-stdin
    description: "Log in to registry"
    local: true
  - id: build_image
    run: |
      set -eu
      docker build \
        -t "${STEP_IMAGE_REF}:${STEP_IMAGE_TAG}" \
        -t "${STEP_IMAGE_REF}:main" \
        .
    description: "Build image"
    local: true
  - id: push_sha_image
    run: |
      set -eu
      docker push "${STEP_IMAGE_REF}:${STEP_IMAGE_TAG}"
    description: "Push SHA-tagged image"
    local: true
  - id: push_main_image
    run: |
      set -eu
      docker push "${STEP_IMAGE_REF}:main"
    description: "Push main tag"
    local: true
  - id: render_compose
    run: |
      set -eu
      APP_IMAGE="${STEP_IMAGE_REF}:${STEP_IMAGE_TAG}" docker compose -f docker-compose.yml config > rendered-compose.yml
      echo "Rendered compose:"
      sed -n '1,160p' rendered-compose.yml
    description: "Render dashboard compose YAML"
    local: true
  - id: build_dashboard_payload
    run: |
      set -eu
      jq -n \
        --arg name "${INPUT_APP_NAME}" \
        --rawfile compose_yaml rendered-compose.yml \
        '{name: $name, compose_yaml: $compose_yaml}' > dashboard-update.json
    description: "Build dashboard update payload"
    local: true
  - id: update_dashboard_compose
    run: |
      set -eu
      if ! curl --fail --show-error --silent \
        -u "${INPUT_DASHBOARD_USER}:${INPUT_DASHBOARD_PASS}" \
        -X PUT "${INPUT_DASHBOARD_URL}/api/apps/${INPUT_APP_ID}" \
        -H 'Content-Type: application/json' \
        --data @dashboard-update.json; then
        curl --show-error --silent \
          -u "${INPUT_DASHBOARD_USER}:${INPUT_DASHBOARD_PASS}" \
          "${INPUT_DASHBOARD_URL}/api/apps/${INPUT_APP_ID}/logs?lines=120" || true
        exit 1
      fi
    description: "Update app compose in dashboard"
    local: true
  - id: trigger_dashboard_deploy
    run: |
      set -eu
      if ! curl --fail --show-error --silent \
        -u "${INPUT_DASHBOARD_USER}:${INPUT_DASHBOARD_PASS}" \
        -X POST "${INPUT_DASHBOARD_URL}/api/apps/${INPUT_APP_ID}/deploy"; then
        curl --show-error --silent \
          -u "${INPUT_DASHBOARD_USER}:${INPUT_DASHBOARD_PASS}" \
          "${INPUT_DASHBOARD_URL}/api/apps/${INPUT_APP_ID}/logs?lines=120" || true
        exit 1
      fi
    description: "Trigger dashboard deploy"
    local: true
  - id: smoke_test
    run: |
      set -eu
      for attempt in 1 2 3 4 5 6; do
        if curl --fail --show-error --silent "${INPUT_HEALTHCHECK_URL}" > healthcheck.json; then
          cat healthcheck.json
          exit 0
        fi
        sleep 5
      done
      curl --show-error --silent \
        -u "${INPUT_DASHBOARD_USER}:${INPUT_DASHBOARD_PASS}" \
        "${INPUT_DASHBOARD_URL}/api/apps/${INPUT_APP_ID}/logs?lines=120" || true
      exit 1
    description: "Smoke test deployed app"
    local: true
    when: INPUT_HEALTHCHECK_URL != ""
